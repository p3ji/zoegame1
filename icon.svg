<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Cozy warm background -->
  <rect width="512" height="512" rx="120" fill="#f7ede2" />
  
  <!-- Outer table shade -->
  <circle cx="256" cy="270" r="210" fill="#CD853F" opacity="0.15" />
  
  <!-- Vintage Porcelain Plate rim -->
  <circle cx="256" cy="256" r="190" fill="#FFFBF0" stroke="#5072A7" stroke-width="8" />
  <circle cx="256" cy="256" r="172" fill="none" stroke="#D4AF37" stroke-width="4" opacity="0.6" />
  
  <!-- Outer rim dots decoration -->
  <circle cx="256" cy="256" r="182" fill="none" stroke="#5072A7" stroke-width="4" stroke-dasharray="10 15" opacity="0.5" />

  <!-- Central basin of plate -->
  <circle cx="256" cy="256" r="128" fill="#FFFDF8" stroke="#D4AF37" stroke-width="2" />
  
  <!-- Plate contents: A cute strawberry macaron and mint leaf -->
  <!-- Macaron bottom shell shadow -->
  <ellipse cx="240" cy="275" rx="55" ry="32" fill="#D36B82" opacity="0.25" />
  
  <!-- Macaron Bottom Shell -->
  <path d="M 185 270 C 185 250 295 250 295 270 C 295 285 280 298 240 298 C 200 298 185 285 185 270 Z" fill="#F293A7" stroke="#C45A70" stroke-width="3" />
  <!-- Foot crumbly part -->
  <path d="M 188 268 Q 240 263 292 268 Q 284 278 240 278 Q 196 278 188 268" fill="#DC7188" />
  <!-- Cream filling -->
  <ellipse cx="240" cy="261" rx="46" ry="12" fill="#FFF5F7" stroke="#F6D0D8" stroke-width="2" />
  <!-- Macaron Top Shell -->
  <path d="M 185 252 C 185 228 295 228 295 252 C 295 262 280 270 240 270 C 200 270 185 262 185 252 Z" fill="#F7AEC0" stroke="#C45A70" stroke-width="3" />
  <!-- Foot -->
  <path d="M 188 254 Q 240 257 292 254 Q 284 262 240 262 Q 196 262 188 254" fill="#E8839C" />
  
  <!-- Top Highlight -->
  <path d="M 200 238 C 215 228 255 228 272 238" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" opacity="0.6" />
  
  <!-- Mint Leaf garnish -->
  <g transform="translate(290, 200) rotate(15)">
    <!-- Leaf body -->
    <path d="M 10 35 C 10 15 45 10 50 10 C 50 10 45 35 25 45 C 15 48 10 42 10 35 Z" fill="#6B9C58" stroke="#486D39" stroke-width="2.5" />
    <path d="M 12 33 C 12 18 42 14 46 14" fill="none" stroke="#88BC73" stroke-width="2" />
    <!-- Leaf veins -->
    <line x1="28" y1="28" x2="16" y2="22" stroke="#486D39" stroke-width="2" />
    <line x1="38" y1="20" x2="30" y2="12" stroke="#486D39" stroke-width="2" />
  </g>
  
  <!-- Rising steam/aroma waves -->
  <path d="M 230 180 Q 215 150 235 120 T 215 90" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" opacity="0.3" />
  <path d="M 270 170 Q 255 145 270 120 T 255 95" fill="none" stroke="#D4AF37" stroke-width="3" stroke-linecap="round" opacity="0.25" />
</svg>
