<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle or rounded rect for icon styling -->
  <rect width="512" height="512" rx="100" fill="#ecdab9" />
  
  <!-- Subtle craft paper texture grid (faint) -->
  <path d="M 0 50 L 512 50 M 0 100 L 512 100 M 0 150 L 512 150 M 0 200 L 512 200 M 0 250 L 512 250 M 0 300 L 512 300 M 0 350 L 512 350 M 0 400 L 512 400 M 0 450 L 512 450" stroke="rgba(139, 90, 43, 0.04)" stroke-width="2"/>
  <path d="M 50 0 L 50 512 M 100 0 L 100 512 M 150 0 L 150 512 M 200 0 L 200 512 M 250 0 L 250 512 M 300 0 L 300 512 M 350 0 L 350 512 M 400 0 L 400 512 M 450 0 L 450 512" stroke="rgba(139, 90, 43, 0.04)" stroke-width="2"/>

  <!-- The Cardboard Box Body -->
  <g transform="translate(60, 80)">
    <!-- Box Shadow -->
    <rect x="25" y="25" width="350" height="310" rx="30" fill="#85551c" opacity="0.3" />
    
    <!-- Main Box Face (Cardboard Light) -->
    <rect x="10" y="10" width="350" height="310" rx="30" fill="#d7a15c" stroke="#2b2b2b" stroke-width="12" />
    
    <!-- Box Flaps details -->
    <!-- Left flap -->
    <path d="M 30 10 L 180 10 L 170 -30 L 40 -30 Z" fill="#c68f49" stroke="#2b2b2b" stroke-width="10" stroke-linejoin="round" />
    <!-- Right flap -->
    <path d="M 190 10 L 340 10 L 330 -30 L 200 -30 Z" fill="#c68f49" stroke="#2b2b2b" stroke-width="10" stroke-linejoin="round" />

    <!-- Mascot Face details -->
    <!-- Eyes -->
    <circle cx="110" cy="160" r="24" fill="#2b2b2b" />
    <circle cx="110" cy="160" r="6" fill="#ffffff" />
    <circle cx="260" cy="160" r="24" fill="#2b2b2b" />
    <circle cx="260" cy="160" r="6" fill="#ffffff" />
    
    <!-- Rosy Cheeks -->
    <ellipse cx="75" cy="200" rx="20" ry="12" fill="#fca5a5" opacity="0.7" />
    <ellipse cx="295" cy="200" rx="20" ry="12" fill="#fca5a5" opacity="0.7" />

    <!-- Cute Smiling Mouth -->
    <path d="M 155 200 Q 185 240 215 200" fill="none" stroke="#2b2b2b" stroke-width="12" stroke-linecap="round" />
    
    <!-- Marker lines on cardboard edges to give handcrafted feel -->
    <path d="M 20 20 L 20 310" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round" />
    <path d="M 20 20 L 350 20" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Masking Tape holding the "n-1" sign -->
  <g transform="translate(240, 310) rotate(-8)">
    <!-- Tape background -->
    <rect x="-10" y="-10" width="220" height="90" fill="rgba(234, 213, 171, 0.95)" stroke="rgba(198, 143, 73, 0.5)" stroke-width="3" rx="5" />
    
    <!-- The "n-1" Marker Text -->
    <text x="100" y="55" font-family="'Fredoka', 'Patrick Hand', sans-serif" font-weight="900" font-size="64" fill="#2b2b2b" text-anchor="middle">n-1</text>
    
    <!-- Scribble underline -->
    <path d="M 20 68 Q 100 78 180 66" fill="none" stroke="#2b2b2b" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
